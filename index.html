<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SPTS Classic Calculator | Optimized</title>
  <style>
    body { background: #111; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; line-height: 1.6; }
    h1 { color: #0ff; text-shadow: 0 0 10px #0ff; }
    .container { max-width: 900px; margin: auto; }
    label { display: flex; flex-direction: column; margin-top: 10px; font-weight: bold; color: #0ff; }
    input, select { margin-top: 5px; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; width: 100%; box-sizing: border-box; }
    input:focus { outline: 2px solid #0ff; background: #2a2a2a; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 10px; }
    button { margin-top: 30px; padding: 15px; background: #0ff; color: #111; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1.1rem; transition: 0.2s; }
    button:hover { background: #0cc; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3); }
    #result { margin-top: 25px; padding: 20px; background: #1a1a1a; border-left: 5px solid #ff69b4; border-radius: 8px; font-family: monospace; font-size: 1.1rem; color: #ff69b4; white-space: pre-line; }
    .credits { margin-top: 40px; text-align: center; font-size: 14px; color: #444; }
    .credits a { color: #0ff; text-decoration: none; opacity: 0.7; }
    .credits a:hover { opacity: 1; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>SPTS Classic Calculator</h1>
    <p style="color: #888;">Optimized for massive stats (Qi, Sx, Sp+)</p>
    
    <div class="form-row">
      <label>Power Type
        <select id="powerType">
          <option value="1">Fist Strength (1s/tick)</option>
          <option value="1.25">Body Toughness (1.25s/tick)</option>
          <option value="1.5">Psychic Power (1.5s/tick)</option>
        </select>
      </label>
      <label>Current Stat Amount
        <input type="text" id="currentStat" value="0">
      </label>
      <label>Required Stat Amount
        <input type="text" id="requiredStat" value="1Qi">
      </label>
      <label>Current Multiplier
        <input type="text" id="multiplier" value="1">
      </label>
      <label>Base Gain (per tick)
        <input type="text" id="baseGain" value="1">
      </label>
    </div>

    <button onclick="calculateTime()">Calculate Training Time</button>
    <div id="result">Results will appear here...</div>
    
    <div class="credits">
      <a href="https://skyabc.me" target="_blank">made by sky!!</a>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
  <script>
    function parseValue(str) {
      if (!str) return new Decimal(0);
      str = str.trim().toUpperCase();
      let val = str.replace(/[A-Z]/g, '');
      let suffix = str.replace(/[0-9.]/g, '');
      
      const multipliers = {
        'K': 1e3, 'M': 1e6, 'B': 1e9, 'T': 1e12, 
        'QA': 1e15, 'QI': 1e18, 'SX': 1e21, 'SP': 1e24, 'O': 1e27, 'N': 1e30
      };

      let mult = multipliers[suffix] || 1;
      return new Decimal(val || 0).times(mult);
    }

    function formatNumber(num) {
      num = new Decimal(num);
      if (num.gte(1e30)) return num.div(1e30).toFixed(2) + 'N';
      if (num.gte(1e27)) return num.div(1e27).toFixed(2) + 'O';
      if (num.gte(1e24)) return num.div(1e24).toFixed(2) + 'Sp';
      if (num.gte(1e21)) return num.div(1e21).toFixed(2) + 'Sx';
      if (num.gte(1e18)) return num.div(1e18).toFixed(2) + 'Qi';
      if (num.gte(1e15)) return num.div(1e15).toFixed(2) + 'Qa';
      if (num.gte(1e12)) return num.div(1e12).toFixed(2) + 'T';
      if (num.gte(1e9)) return num.div(1e9).toFixed(2) + 'B';
      if (num.gte(1e6)) return num.div(1e6).toFixed(2) + 'M';
      if (num.gte(1e3)) return num.div(1e3).toFixed(2) + 'K';
      return num.toFixed(0);
    }

    function calculateTime() {
      try {
        const tickSpeed = new Decimal(document.getElementById('powerType').value);
        const current = parseValue(document.getElementById('currentStat').value);
        const required = parseValue(document.getElementById('requiredStat').value);
        const multi = parseValue(document.getElementById('multiplier').value);
        const base = parseValue(document.getElementById('baseGain').value);

        // Calculate total gain per single tick
        const gainPerTick = base.times(multi);
        
        // Gap to bridge
        const gap = required.minus(current);

        if (gap.lte(0)) {
          document.getElementById('result').innerText = "Goal already reached!";
          return;
        }

        // Ticks needed = Gap / Gain per tick
        const totalTicks = gap.div(gainPerTick).ceil();
        
        // Total time = Ticks * Seconds per tick
        const totalSeconds = totalTicks.times(tickSpeed);

        // Time Conversions
        const hours = totalSeconds.div(3600);
        const days = hours.div(24);
        const months = days.div(30.44);
        const years = days.div(365.25);

        let output = `[ STAT REPORT ]\n`;
        output += `Total Ticks Needed: ${formatNumber(totalTicks)}\n`;
        output += `Gain per Tick: ${formatNumber(gainPerTick)}\n\n`;
        output += `[ TIME ESTIMATION ]\n`;
        output += `Hours: ${hours.toFixed(2)}\n`;
        output += `Days: ${days.toFixed(2)}\n`;
        output += `Months: ${months.toFixed(2)}\n`;
        output += `Years: ${years.toFixed(2)}`;

        document.getElementById('result').innerText = output;
      } catch (e) {
        document.getElementById('result').innerText = "Error: Please check your input format.";
      }
    }
  </script>
</body>
</html>
