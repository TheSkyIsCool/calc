<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SPTS Classic Calculator | Optimized</title>
  <style>
    body { background: #111; color: #eee; font-family: Arial, sans-serif; padding: 20px; position: relative; }
    h1 { color: #0ff; text-shadow: 0 0 8px #0ff; }
    label { display: flex; flex-direction: column; margin-top: 10px; font-weight: bold; }
    input, select { margin-top: 5px; padding: 10px; border-radius: 8px; border: none; width: 250px; background: #222; color: #fff; transition: all 0.2s ease; }
    input:focus, select:focus { outline: 2px solid #0ff; background: #2a2a2a; }
    .quest-section { margin-top: 15px; padding: 15px; border: 1px solid #444; border-radius: 8px; display: flex; flex-direction: column; background: #161616; }
    .quest-section h3 { margin: 0 0 10px 0; color: #ff69b4; font-size: 1.1rem; }
    .form-row { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 10px; }
    button { margin-top: 25px; padding: 15px 30px; background: #0ff; color: #111; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; font-size: 1rem; }
    button:hover { background: #0cc; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3); }
    #result { margin-top: 20px; font-size: 18px; color: #ff69b4; white-space: pre-line; line-height: 1.6; font-family: monospace; border-left: 4px solid #ff69b4; padding-left: 15px; }
    .credits { position: fixed; bottom: 10px; right: 20px; font-size: 14px; color: #0ff; }
    .credits a { color: #0ff; text-decoration: none; }
    .credits a:hover { text-decoration: underline; }
    .checkbox-label { flex-direction: row; align-items: center; gap: 10px; cursor: pointer; font-weight: normal; margin-top: 5px; }
    .checkbox-label input { width: 18px; height: 18px; margin: 0; }
  </style>
</head>
<body>
  <h1>SPTS Classic Calculator</h1>
  
  <div class="form-row">
    <label>Power Type:
      <select id="powerType">
        <option value="fist">Fist Strength (1s/tick)</option>
        <option value="body">Body Toughness (1.25s/tick)</option>
        <option value="psychic">Psychic Power (1.5s/tick)</option>
      </select>
    </label>
    <label>Current Stat Amount:
      <input type="text" id="currentStat" value="0" placeholder="Use K/M/B/T etc.">
    </label>
    <label>Required Stat Amount:
      <input type="text" id="requiredStat" value="1Qi" placeholder="Use K/M/B/T etc.">
    </label>
    <label>Current Tokens:
      <input type="text" id="tokens" value="0">
    </label>
    <label>Current Multiplier:
      <select id="multiplier">
        <option value="1">1x</option><option value="2">2x</option><option value="4">4x</option>
        <option value="8">8x</option><option value="16">16x</option><option value="32">32x</option>
        <option value="64">64x</option><option value="128">128x</option><option value="256">256x</option>
        <option value="512">512x</option><option value="1024">1024x</option><option value="2048">2048x</option>
        <option value="4096">4096x</option><option value="8192">8192x</option><option value="16384">16384x</option>
        <option value="32768">32768x</option><option value="65536">65536x</option><option value="131072">131072x</option>
        <option value="262144">262144x</option><option value="524288">524288x</option>
      </select>
    </label>
    <label>Tick Gain :
      <input type="text" id="tickGain" value="1">
    </label>
  </div>

  <div class="quest-section">
    <h3>Daily Quests (+20 tokens each)</h3>
    <label class="checkbox-label"><input type="checkbox" class="dailyQuest"> Fist Strength</label>
    <label class="checkbox-label"><input type="checkbox" class="dailyQuest"> Body Toughness</label>
    <label class="checkbox-label"><input type="checkbox" class="dailyQuest"> Psychic Power</label>
    <label class="checkbox-label"><input type="checkbox" class="dailyQuest"> Movement Speed</label>
    <label class="checkbox-label"><input type="checkbox" class="dailyQuest"> Jump Force</label>
  </div>

  <div class="quest-section">
    <h3>Weekly Quests (+100, 500, 2500 tokens per stat)</h3>
    <label class="checkbox-label"><input type="checkbox" class="weeklyQuest" data-tokens="100"> Easy Quest (+100)</label>
    <label class="checkbox-label"><input type="checkbox" class="weeklyQuest" data-tokens="500"> Medium Quest (+500)</label>
    <label class="checkbox-label"><input type="checkbox" class="weeklyQuest" data-tokens="2500"> Hard Quest (+2500)</label>
  </div>

  <button onclick="calculateTime()">Calculate</button>
  <div id="result">Results will appear here...</div>
  
  <div class="credits"><a href="https://skyabc.me" target="_blank">made by sky!!</a></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
  <script>
    const multiplierCosts = {
      2:100,4:200,8:500,16:1000,32:2000,64:5000,128:10000,256:15000,
      512:20000,1024:50000,2048:100000,4096:200000,8192:500000,16384:1000000,
      32768:2000000,65536:5000000,131072:10000000,262144:20000000,524288:50000000
    };
    const tickSpeeds = {fist:1, body:1.25, psychic:1.5};

    function parseValue(str) {
      if (!str) return new Decimal(0);
      str = str.trim().toUpperCase();
      let val = str.replace(/[A-Z]/g, '');
      let suffix = str.replace(/[0-9.]/g, '');
      const mults = {
        'K': 1e3, 'M': 1e6, 'B': 1e9, 'T': 1e12, 
        'QA': 1e15, 'QI': 1e18, 'SX': 1e21, 'SP': 1e24, 'O': 1e27, 'N': 1e30
      };
      return new Decimal(val || 0).times(mults[suffix] || 1);
    }

    function formatNumber(num) {
      num = new Decimal(num);
      if (num.gte(1e21)) return num.div(1e21).toFixed(2)+'Sx';
      if (num.gte(1e18)) return num.div(1e18).toFixed(2)+'Qi';
      if (num.gte(1e15)) return num.div(1e15).toFixed(2)+'Qa';
      if (num.gte(1e12)) return num.div(1e12).toFixed(2)+'T';
      if (num.gte(1e9)) return num.div(1e9).toFixed(2)+'B';
      if (num.gte(1e6)) return num.div(1e6).toFixed(2)+'M';
      if (num.gte(1e3)) return num.div(1e3).toFixed(2)+'K';
      return num.toFixed(0);
    }

    function calculateTime() {
      let powerType = document.getElementById('powerType').value;
      let tickSpeed = new Decimal(tickSpeeds[powerType]);
      let currentStat = parseValue(document.getElementById('currentStat').value);
      let requiredStat = parseValue(document.getElementById('requiredStat').value);
      let tokens = parseValue(document.getElementById('tokens').value);
      let multiplier = new Decimal(document.getElementById('multiplier').value);
      let tickGain = parseValue(document.getElementById('tickGain').value);

      // Quest bonus logic from your previous code
      let dailyBonus = document.querySelectorAll('.dailyQuest:checked').length * 20;
      let weeklyBonus = 0;
      document.querySelectorAll('.weeklyQuest:checked').forEach(cb => {
        weeklyBonus += parseInt(cb.getAttribute('data-tokens'));
      });

      let elapsed = new Decimal(0);
      
      // OPTIMIZED SIMULATION ENGINE
      // This loop "jumps" between multiplier upgrades instead of counting every second.
      while (currentStat.lt(requiredStat)) {
        let currentTotalGain = tickGain.times(multiplier);
        let nextMulti = multiplier.times(2);
        
        // 1. Calculate how many tokens we still need for the next upgrade
        let tokensNeeded = new Decimal(multiplierCosts[nextMulti] || Infinity).minus(tokens);

        // 2. If we can afford a better multiplier or earn it soon, we simulate that jump
        if (multiplierCosts[nextMulti] && tokensNeeded.gt(-Infinity)) {
          // Tokens are earned at 5 per 60s (1 token per 12s)
          let timeToEarnTokens = tokensNeeded.gt(0) ? tokensNeeded.times(12) : new Decimal(0);
          let ticksToNextUpgrade = timeToEarnTokens.div(tickSpeed).ceil();
          let statsDuringWait = ticksToNextUpgrade.times(currentTotalGain);

          // If we finish before we ever reach the next upgrade, break out
          if (currentStat.plus(statsDuringWait).gte(requiredStat)) break;

          // Otherwise, jump to the upgrade point
          currentStat = currentStat.plus(statsDuringWait);
          elapsed = elapsed.plus(ticksToNextUpgrade.times(tickSpeed));
          tokens = tokens.plus(tokensNeeded.gt(0) ? tokensNeeded : 0); 
          
          // Buy the upgrade
          tokens = tokens.minus(multiplierCosts[nextMulti]);
          multiplier = nextMulti;
        } else {
          // No more possible upgrades, calculate final stretch
          let finalGap = requiredStat.minus(currentStat);
          let finalTicks = finalGap.div(currentTotalGain).ceil();
          elapsed = elapsed.plus(finalTicks.times(tickSpeed));
          currentStat = requiredStat;
          break;
        }
      }

      let hours = elapsed.div(3600);
      let days = hours.div(24);
      let months = days.div(30.44);
      let years = days.div(365.25);

      document.getElementById('result').innerText =
        `Time required: ${hours.toFixed(2)} hours\n`+
        `${days.toFixed(2)} days | ${months.toFixed(2)} months | ${years.toFixed(2)} years\n\n`+
        `Final Stat: ${formatNumber(currentStat)}\n`+
        `Final Multiplier: ${multiplier}x\n`+
        `Final Tick Gain: ${formatNumber(tickGain.times(multiplier))} per tick\n`+
        `Tokens remaining: ${formatNumber(tokens)}`;
    }
  </script>
</body>
</html>
